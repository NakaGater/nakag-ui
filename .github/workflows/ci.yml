name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - name: Verify "use client" survives bundling
        run: |
          head -1 dist/components/ui/dialog.js | grep -q '"use client"'
          head -1 dist/components/ui/select.js | grep -q '"use client"'
      - run: pnpm check:pkg
      - run: pnpm build-storybook
